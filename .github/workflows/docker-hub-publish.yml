# Push gate-12s eval images to Docker Hub on release tags or manual dispatch.
name: docker-hub-publish

on:
  push:
    tags:
      - "eval-moon-xq-*"
      - "t1-leaf-physics-*"
      - "t1-eval-*"
  workflow_dispatch:

env:
  REGISTRY: stanbyriukov31
  IMAGE: hwatom-kv-shim

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push f1prime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/gate-12s/Dockerfile.f1prime
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:gate12s-f1prime
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:t1-leaf-physics-20260525

      - name: Build and push eval
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/gate-12s/Dockerfile.eval
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:gate12s-eval
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:eval-moon-xq-20260526

      - name: Update Docker Hub overview (short + full description)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          JWT=$(curl -sS -X POST -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          SHORT='H100 KV eval: cuMem leaf pack 42% + MOON-Xq -58% bytes. vLLM/Qwen. Eval-only.'
          jq -n --arg d "$SHORT" --rawfile f docs/DOCKERHUB.md \
            '{description:$d, full_description:$f}' > /tmp/hub-patch.json
          curl -sS -X PATCH \
            -H "Authorization: JWT ${JWT}" \
            -H "Content-Type: application/json" \
            -d @/tmp/hub-patch.json \
            "https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/hwatom-kv-shim/"
